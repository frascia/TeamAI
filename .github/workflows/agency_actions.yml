name: 🚀 Plancia di Comando Agenti IA

on:
  schedule:
    - cron: '0 8 * * *' # Gira comunque da solo ogni mattina alle 9:00 italiane
  workflow_dispatch: # Questa è la tua nuova interfaccia grafica su GitHub!
    inputs:
      team_config:
        description: 'Nome del file JSON del tavolo (es. viaggio_giappone)'
        required: true
        default: 'viaggio_giappone'
      task_prompt:
        description: 'Cosa devono fare/ottimizzare gli agenti oggi?'
        required: true
        default: 'Ottimizzate la tratta Busan-Fukuoka in traghetto e pianificate lo Shikoku.'
      max_giri:
        description: 'Numero massimo di cicli di discussione'
        required: false
        default: '12'

jobs:
  run-round-table:
    runs-on: ubuntu-latest

    steps:
    - name: 📑 Check out del codice
      uses: actions/checkout@v3

    - name: 🐍 Configurazione Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Installazione librerie
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🤖 Riunione degli Agenti
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        # Passiamo i dati inseriti a schermo su GitHub allo script Python
        ACTION_TEAM_CONFIG: ${{ github.event.inputs.team_config }}
        ACTION_TASK_PROMPT: ${{ github.event.inputs.task_prompt }}
        ACTION_MAX_GIRI: ${{ github.event.inputs.max_giri }}
      run: |
        python run_agency.py

    - name: 💾 Commit e Push automatico dei risultati nel tuo GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        # Crea le cartelle se non esistono ancora per evitare errori di git
        mkdir -p itinerari audio
        git add itinerari/ audio/
        git commit -m "🤖 Risultati Tavola Rotonda: PDF e MP3 aggiornati" || echo "Nessuna modifica rilevata"
        git push
