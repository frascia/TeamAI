name: Convocazione Periodica del Team di Agenti

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # Permette anche il lancio manuale cliccando su GitHub

jobs:
  run-agents:
    runs-on: ubuntu-latest

    steps:
    - name: 📑 Check out del codice sorgente
      uses: actions/checkout@v3

    - name: 🐍 Configurazione ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Installazione delle dipendenze del team
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🤖 Risveglio degli agenti e discussione del giorno
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
      run: |
        python run_agency.py
